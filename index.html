<!DOCTYPE html>
<html>
<head>
  <title>Thirsty Games</title>
  <meta name="description" content="Welcome to Thirsty Games — a Rock Paper Scissors style game inspired by The Hunger Games, but with drinks and many more options.">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Q54QNH51GX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-Q54QNH51GX');
</script>
</head>
<body>
<div id="h"></div>
<div id="buttons"></div>
<button id="NEW" onclick="resetGame()">New Game</button>
<script>
const score = JSON.parse(localStorage.getItem('score')) || { Wins: 0, Losses: 0, Ties: 0}
const drinks = [
  'Irn Bru','Pepsi','Seven Up','Coke','Lemonade','Tea','Fanta','Sprite','Water','Coffee','Milk','Juice','Cola Zero',
  'Dr Pepper','Ginger Ale','Tonic','Energy Drink','Arnold Palmer','Shirley Temple'
]
const rules = {
  "Irn Bru": ["Pepsi","Seven Up","Coke","Lemonade","Tea","Fanta","Sprite","Water","Shirley Temple"],
  "Pepsi": ["Seven Up","Coke","Lemonade","Tea","Fanta","Sprite","Water","Coffee","Arnold Palmer"],
  "Seven Up": ["Coke","Lemonade","Tea","Fanta","Sprite","Water","Coffee","Milk","Shirley Temple"],
  "Coke": ["Lemonade","Tea","Fanta","Sprite","Water","Coffee","Milk","Juice","Arnold Palmer"],
  "Lemonade": ["Tea","Fanta","Sprite","Water","Coffee","Milk","Juice","Cola Zero","Shirley Temple"],
  "Tea": ["Fanta","Sprite","Water","Coffee","Milk","Juice","Cola Zero","Dr Pepper","Arnold Palmer"],
  "Fanta": ["Sprite","Water","Coffee","Milk","Juice","Cola Zero","Dr Pepper","Ginger Ale","Shirley Temple"],
  "Sprite": ["Water","Coffee","Milk","Juice","Cola Zero","Dr Pepper","Ginger Ale","Tonic","Arnold Palmer"],
  "Water": ["Coffee","Milk","Juice","Cola Zero","Dr Pepper","Ginger Ale","Tonic","Energy Drink","Shirley Temple"],
  "Coffee": ["Milk","Juice","Cola Zero","Dr Pepper","Ginger Ale","Tonic","Energy Drink","Irn Bru","Arnold Palmer"],
  "Milk": ["Juice","Cola Zero","Dr Pepper","Ginger Ale","Tonic","Energy Drink","Irn Bru","Pepsi","Shirley Temple"],
  "Juice": ["Cola Zero","Dr Pepper","Ginger Ale","Tonic","Energy Drink","Irn Bru","Pepsi","Seven Up","Arnold Palmer"],
  "Cola Zero": ["Dr Pepper","Ginger Ale","Tonic","Energy Drink","Irn Bru","Pepsi","Seven Up","Coke","Shirley Temple"],
  "Dr Pepper": ["Ginger Ale","Tonic","Energy Drink","Irn Bru","Pepsi","Seven Up","Coke","Lemonade","Arnold Palmer"],
  "Ginger Ale": ["Tonic","Energy Drink","Irn Bru","Pepsi","Seven Up","Coke","Lemonade","Tea","Shirley Temple"],
  "Tonic": ["Energy Drink","Irn Bru","Pepsi","Seven Up","Coke","Lemonade","Tea","Fanta","Arnold Palmer"],
  "Energy Drink": ["Irn Bru","Pepsi","Seven Up","Coke","Lemonade","Tea","Fanta","Sprite","Shirley Temple"],
  "Arnold Palmer": ["Irn Bru","Ginger Ale","Seven Up","Coke","Lemonade","Tonic","Fanta","Sprite","Pepsi"],
  "Shirley Temple": ["Irn Bru","Lemonade","Tea","Fanta","Sprite","Water","Coffee","Milk", "Arnold Palmer"]
}
function play(move){
  const cm = drinks[Math.floor(Math.random() * drinks.length)]
  let r = ""
  move === cm
  ? (r = "Tie", score.Ties++) : rules[move].includes(cm)   ? (r = "You Win", score.Wins++)   : (r = "You Lose", score.Losses++)
  localStorage.setItem('score', JSON.stringify(score))
  alert(
    `you chose ${move}, computer chose ${cm}, ${r}\n` +
    `Wins: ${score.Wins} | Losses: ${score.Losses} | Ties: ${score.Ties}`
  )
}
function resetGame(){
  Object.assign(score,{Wins:0,Losses:0,Ties:0})
  localStorage.setItem('score', JSON.stringify(score))
  alert("Score reset!")
}
const colors = {
  "Irn Bru": {
    background:"orange",
    text:"blue"
  },
  "Pepsi": {
    background:"purple",
    text:"red"
  },
  "Seven Up": {
    background:"green",
    text:"yellow"
  },
  "Coke": {
    background:"red",
    text:"white"
  },
  "Lemonade": {
    background:"yellow",
    text:"green"
  },
  "Tea": {
    background:"brown",
    text:"green"
  },
  "Fanta": {
    background:"yellow",
    text:"orange"
  },
  "Sprite": {
    background:"orange",
    text:"blue"
  },
  "Water": {
    background:"blue",
    text:"white"
  },
  "Coffee": {
    background:"black",
    text:"white"
  },
  "Milk": {
    background:"white",
    text:"black"
  },
  "Juice": {
    background:"black",
    text:"purple"
  },
  "Cola Zero": {
    background:"red",
    text:"blue"
  },
  "Dr Pepper": {
    background:"blue",
    text:"red"
  },
  "Ginger Ale": {
    background:"orange",
    text:"black"
  },
  "Tonic": {
    background:"white",
    text:"blue"
  },
  "Energy Drink": {
    background:"blue",
    text:"orange"
  },
  "Arnold Palmer": {
    background:"yellow",
    text:"brown"
  },
  "Shirley Temple": {
    background:"pink",
    text:"orange"
  }
}
  const buttonArea = document.getElementById("buttons")
for (let drink of drinks){
  buttonArea.innerHTML += 
  `<button style="background:${colors[drink].background};color:${colors[drink].text}" onclick="play('${drink}')">${drink}</button>`
}
const h =  document.getElementById("h")
for (let drink of drinks){
  h.innerHTML += 
  `<b> ${drink}</b> → ${rules[drink]}<br>`
}
</script>
</body>
</html>
